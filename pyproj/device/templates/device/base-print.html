{% load static %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}
                Print
            {% endblock title %}
        </title>
        <link rel="stylesheet" href="{% static 'css/print.css' %}" />
        {% block extra_head %}
        {% endblock extra_head %}
    </head>

    <body>
        <div class="print-toolbar no-print">
            <button type="button" onclick="window.print();">Print</button>
        </div>

        {% block content %}
        {% endblock content %}

        {% block extra_js %}
        {% endblock extra_js %}
    </body>
</html>
