<header class="header header-sticky mb-4">
    <div class="container-fluid">
        {% if user.is_authenticated %}
            <div class="d-flex align-items-center w-100 flex-wrap">
                <button class="header-toggler d-lg-none me-2" type="button" data-coreui-toggle="sidebar" data-coreui-breakpoint="lg" aria-label="Toggle sidebar">
                    <span class="header-toggler-icon"></span>
                </button>
                <ul class="header-nav ms-auto d-flex align-items-center mb-0">
                    <li class="nav-item dropdown">
                        <a class="nav-link py-0" href="{% url 'user_settings' %}" title="User Settings">
                            <span class="d-inline d-md-inline me-2">{% if user.full_name %}{{ user.full_name }}{% else %}{{ user.get_short_name }}{% endif %}</span>
                            {% load avatar_tags %}
                            {% user_avatar user size=40 show_name=False %}
                        </a>
                        {% if demo_name == 'b5demo' %}
                            <div class="dropdown-menu dropdown-menu-end pt-0">
                                <a class="dropdown-item" href="#">
                                    <i class="icon cil-chart-line me-2"></i>
                                    Analytics
                                </a>
                                <a class="dropdown-item" href="#">
                                    <i class="icon cil-settings me-2"></i>
                                    Settings
                                </a>
                                <div class="dropdown-divider"></div>
                                <a class="dropdown-item" href="#">
                                    <i class="icon cil-info me-2"></i>
                                    Help
                                </a>
                            </div>
                        {% endif %}
                    </li>
                </ul>
                <form method="get" action="{% url 'device:device_search' %}" class="w-100 mt-2 mt-md-0 d-md-inline-flex flex-md-grow-1 flex-md-shrink-0" style="max-width: 100%;">
                    <div class="input-group w-100">
                        <input type="text" name="q" class="form-control" value="{{ q }}" placeholder="Serial number search...">
                        <button class="btn btn-outline-secondary" type="submit">
                            <i class="icon cil-magnifying-glass"></i>
                        </button>
                    </div>
                </form>
            </div>
        {% endif %}
    </div>
</header>
